<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>倒计时</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            color: #fff;
        }
        .title {
            font-size: 2rem;
            margin-bottom: 2rem;
            opacity: 0.8;
        }
        .countdown {
            display: flex;
            gap: 1.5rem;
        }
        .time-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 1.5rem 2rem;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.2);
            min-width: 100px;
        }
        .number {
            font-size: 4rem;
            font-weight: bold;
            background: linear-gradient(135deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .label {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-top: 0.5rem;
        }
        .target {
            margin-top: 2rem;
            font-size: 1rem;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="title">距离目标时间还有</div>
    <div class="countdown">
        <div class="time-block">
            <span class="number" id="days">00</span>
            <span class="label">天</span>
        </div>
        <div class="time-block">
            <span class="number" id="hours">00</span>
            <span class="label">时</span>
        </div>
        <div class="time-block">
            <span class="number" id="minutes">00</span>
            <span class="label">分</span>
        </div>
        <div class="time-block">
            <span class="number" id="seconds">00</span>
            <span class="label">秒</span>
        </div>
    </div>
    <div class="target" id="target-display"></div>

    <script>
        // ====== 在这里设置目标时间 ======
        const targetDate = new Date('2027-01-01 00:00:00').getTime();
        // =================================
        
        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;
            
            if (distance < 0) {
                document.querySelector('.title').textContent = '🎉 时间到！';
                return;
            }
            
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            
            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }
        
        // 显示目标时间
        const targetObj = new Date(targetDate);
        document.getElementById('target-display').textContent = '目标: ' + targetObj.toLocaleString('zh-CN');
        
        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
