# ==========================================
# OpenClaw 核心配置文件 (Optimized for WSL2)
# ==========================================

gateway:
  mode: local
  port: 18789
  host: 0.0.0.0  # 允许 WSL2 外部通过宿主机 IP 访问
  listen: "127.0.0.1:18789"
  authToken: "your_secure_token_here"
  logLevel: "info"
  logFile: "/tmp/openclaw/openclaw.log"

# ------------------------------------------
# 智能体模型配置 (修复 MiniMax 路径)
# ------------------------------------------
agent:
  provider: "minimax"
  model: "minimax-portal/MiniMax-M2.5-highspeed"
  apiKey: "5CNzMN5mqmhkkjEVJ0rGIQmDjd5vfRHXAsbMBAvA0uFsJ5FSc0gFd4cjzgoLfPf1jHSq7CsEMtwLHEOWSjUGwUATON3nLVdHNxGnkNoZ4GZmwVp6fcDRtKc" # 请在此处填入你的 MiniMax Key
  systemPrompt: "You are a helpful assistant running in a WSL2 Ubuntu environment."
  stream: true

# ------------------------------------------
# 工具与搜索配置 (添加 Tavily)
# ------------------------------------------
tools:
  allow:
    - exec
    - bash
    - search
    - web
    - file
  exec:
    ask: off
    host: gateway
    security: allowlist
  search:
    provider:
      - google
      - bing
      - tavily  # 启用 Tavily 联网搜索
    tavily:
      apiKey: "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"
  pathPrepend:
    - ~/bin

# ------------------------------------------
# 核心 Agent 定义 (解决 Auth 报错的关键)
# ------------------------------------------
agents:
  main:
    provider: "minimax"
    model: "minimax-portal/MiniMax-M2.5-highspeed"
    tools: ["exec", "search", "web", "bash"]

# ------------------------------------------
# 消息通道配置 (Telegram 修复)
# ------------------------------------------
channels:
  telegram:
    enabled: true
    botToken: "8539445407:AAHqIqQyxlwyXDGuW8K-fyFXurFI2xdCCGg" # 请在此处填入你的 Bot Token
    groupPolicy: "open"
    allowFrom: 
      - 8539445407 # 请在此处填入你的 Telegram User ID
    # 针对 WSL2 网络优化
    autoSelectFamily: false
    dnsResultOrder: "ipv4first"

# ------------------------------------------
# 浏览器与内网穿透
# ------------------------------------------
tailscale:
  enabled: true # 如果不使用 Tailscale，建议先设为 false 避免报错
  binaryPath: "/usr/bin/tailscale"
  serve: true

browser:
  enabled: true
  listen: "127.0.0.1:18791"
  headless: true


# ------------------------------------------
# 技能路径
# -----------------------------------------
skills:
  root: "/home/du/.openclaw/skills"
  allow_absolute_paths: true


# ------------------------------------------
# 存储与健康监控
# ------------------------------------------
canvas:
  root: "/home/du/.openclaw/canvas"
  hostPath: "/__openclaw__/canvas/"

healthMonitor:
  enabled: true
  interval: 300s
  startupGrace: 60s
